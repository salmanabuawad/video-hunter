# Install:
#   sudo cp deploy/nginx-video.wavelync.com.conf /etc/nginx/sites-available/video.wavelync.com
#   sudo ln -sf /etc/nginx/sites-available/video.wavelync.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d video.wavelync.com

server {
    server_name video.wavelync.com;

    client_max_body_size 512M;
    access_log /var/log/nginx/video.wavelync.com.access.log;
    error_log  /var/log/nginx/video.wavelync.com.error.log;

    location /api/ {
        proxy_pass         http://127.0.0.1:8030;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Static SPA
    root  /opt/video_hunter/frontend/dist;
    index index.html;

    # Hash-named build artefacts are immutable — cache them forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must always revalidate so a new bundle hash is picked up
    # on the next page load. Without this, browsers apply heuristic caching
    # and keep serving a stale index pointing at a bundle that no longer
    # exists — the classic "old UI after deploy" symptom.
    location = / {
        add_header Cache-Control "no-store, must-revalidate";
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 80;
    listen [::]:80;
}
